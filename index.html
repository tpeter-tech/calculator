<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <div class="calculator-screen" id="display">123.45</div>

        <div class="calculator-keys">
            <button class="key-btn functional-btn" id="clear">CLEAR</button>
            <button class="key-btn functional-btn" id="backspace">⌫</button>
            <button class="key-btn operator-btn" value="/">÷</button>

            <button class="key-btn num-btn" value="7">7</button>
            <button class="key-btn num-btn" value="8">8</button>
            <button class="key-btn num-btn" value="9">9</button>
            <button class="key-btn operator-btn" value="*">×</button>

            <button class="key-btn num-btn" value="4">4</button>
            <button class="key-btn num-btn" value="5">5</button>
            <button class="key-btn num-btn" value="6">6</button>
            <button class="key-btn operator-btn" value="-">−</button>

            <button class="key-btn num-btn" value="1">1</button>
            <button class="key-btn num-btn" value="2">2</button>
            <button class="key-btn num-btn" value="3">3</button>
            <button class="key-btn operator-btn" value="+">+</button>

            <button class="key-btn num-btn zero-btn" value="0">0</button>
            <button class="key-btn num-btn" value=".">.</button>
            <button class="key-btn equals-btn" id="equals" value="=">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
